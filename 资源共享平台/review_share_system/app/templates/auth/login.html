{% extends 'base.html' %}

{% block title %}登录{% endblock %}

{% block content %}
<div class="row justify-content-center" style="margin-top:3rem;">
    <div class="col-md-5">
        <div class="card-official">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div style="font-size:3rem;">🔐</div>
                    <h3 class="font-weight-bold mt-2">用户登录</h3>
                    <p class="text-muted-official">欢迎回来，请登录您的账号</p>
                </div>
                
                <form method="POST">
                    <div class="form-group">
                        <label for="username" class="font-weight-500">用户名</label>
                        <input type="text" class="form-control form-control-official" id="username" name="username" required placeholder="请输入用户名">
                    </div>
                    
                    <div class="form-group">
                        <label for="password" class="font-weight-500">密码</label>
                        <input type="password" class="form-control form-control-official" id="password" name="password" required placeholder="请输入密码">
                    </div>
                    
                    <div class="form-group form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label text-muted-official" for="remember">记住我</label>
                    </div>
                    
                    <button type="submit" class="btn btn-official btn-block py-2">登 录</button>
                </form>
                
                <div class="mt-4 text-center">
                    <p class="text-muted-official">还没有账号？<a href="{{ url_for('auth.register') }}" class="font-weight-bold" style="color:var(--primary);">立即注册 →</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
