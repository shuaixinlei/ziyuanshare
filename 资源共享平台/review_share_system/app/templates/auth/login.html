{% extends 'base.html' %}

{% block title %}登录 - 复习资料平台{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 animate-fade-in-up">
        <div class="glass-card" style="padding: 40px;">
            <div class="text-center mb-6">
                <div class="sidebar-logo mb-4" style="display: inline-block; width: 100%;">
                    <h1><i class="fas fa-book-open"></i>复习资料</h1>
                    <p>共享平台</p>
                </div>
                <h2 class="glass-card-title">欢迎回来</h2>
                <p class="text-muted mt-2">登录你的账户，继续探索优质资料</p>
            </div>
            
            <form method="POST">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" class="form-control" id="username" name="username" required placeholder="请输入用户名">
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="请输入密码">
                </div>
                
                <div class="form-check mb-4">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label" for="remember">记住我</label>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mb-3">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
            </form>
            
            <div class="text-center">
                <p class="text-muted">
                    还没有账户？ <a href="{{ url_for('auth.register') }}" style="color: #a78bfa;">立即注册</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
