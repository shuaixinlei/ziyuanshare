{% extends 'base.html' %}

{% block title %}注册 - 复习资料平台{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 animate-fade-in-up">
        <div class="glass-card" style="padding: 40px;">
            <div class="text-center mb-6">
                <div class="sidebar-logo mb-4" style="display: inline-block; width: 100%;">
                    <h1><i class="fas fa-book-open"></i>复习资料</h1>
                    <p>共享平台</p>
                </div>
                <h2 class="glass-card-title">创建账户</h2>
                <p class="text-muted mt-2">加入我们，分享和获取优质复习资料</p>
            </div>
            
            <form method="POST">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" class="form-control" id="username" name="username" required placeholder="请输入用户名">
                </div>
                
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="请输入邮箱">
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="请输入密码">
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">确认密码</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required placeholder="请再次输入密码">
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mb-3">
                    <i class="fas fa-user-plus"></i> 注册
                </button>
            </form>
            
            <div class="text-center">
                <p class="text-muted">
                    已有账户？ <a href="{{ url_for('auth.login') }}" style="color: #a78bfa;">立即登录</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
