{% extends 'base.html' %}

{% block title %}编辑用户 - 复习资料平台{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('admin.users') }}">用户管理</a></li>
        <li class="breadcrumb-item active">编辑用户</li>
    </ol>
</nav>

<div class="glass-card animate-fade-in-up">
    <div class="glass-card-header">
        <h2 class="glass-card-title">
            <i class="fas fa-user-edit"></i>编辑用户
        </h2>
    </div>
    <div class="card-body" style="padding: 30px;">
        <form method="POST">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" class="form-control" id="username" name="username" value="{{ user.username }}" required>
            </div>
            
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
            </div>
            
            <div class="form-group">
                <label for="points">积分</label>
                <input type="number" class="form-control" id="points" name="points" value="{{ user.points }}" min="0">
            </div>
            
            <div class="form-check mb-4">
                <input type="checkbox" class="form-check-input" id="is_admin" name="is_admin" {% if user.is_admin %}checked{% endif %}>
                <label class="form-check-label" for="is_admin">设为管理员</label>
            </div>
            
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> 保存修改
            </button>
            <a href="{{ url_for('admin.users') }}" class="btn btn-outline ml-2">
                <i class="fas fa-arrow-left"></i> 返回
            </a>
        </form>
    </div>
</div>
{% endblock %}
