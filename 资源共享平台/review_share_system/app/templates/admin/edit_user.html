{% extends 'base.html' %}
{% block title %}编辑用户{% endblock %}
{% block content %}
<div class="row justify-content-center" style="margin-top:2rem;">
    <div class="col-md-6">
        <div class="card-official">
            <div class="card-body p-5">
                <div class="mb-4">
                    <h4 class="font-weight-bold">✏️ 编辑用户</h4>
                    <p class="text-muted-official">修改用户「{{ user.username }}」的信息</p>
                </div>
                <form method="POST">
                    <div class="form-group">
                        <label for="username" class="font-weight-500">用户名</label>
                        <input type="text" class="form-control form-control-official" id="username" name="username" value="{{ user.username }}" required>
                    </div>
                    <div class="form-group">
                        <label for="email" class="font-weight-500">邮箱</label>
                        <input type="email" class="form-control form-control-official" id="email" name="email" value="{{ user.email }}" required>
                    </div>
                    <div class="form-group form-check">
                        <input type="checkbox" class="form-check-input" id="is_admin" name="is_admin" {% if user.is_admin %}checked{% endif %}>
                        <label class="form-check-label font-weight-500" for="is_admin">设为管理员</label>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-official flex-fill">💾 保存修改</button>
                        <a href="{{ url_for('admin.manage_users') }}" class="btn btn-outline-secondary flex-fill">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
