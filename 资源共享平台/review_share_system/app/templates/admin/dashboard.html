{% extends 'base.html' %}
{% block title %}管理后台{% endblock %}
{% block content %}
<div class="page-header">
    <div class="container">
        <h1>⚙️ 管理后台</h1>
        <p>系统管理与维护</p>
    </div>
</div>
<div class="container" style="margin-top:-0.5rem;">
    <div class="row mb-4">
        <div class="col-md-3 mb-3">
            <div class="card-official text-center" style="border-left:4px solid var(--primary);">
                <div class="card-body py-4">
                    <div class="h2 font-weight-bold text-primary">{{ total_users }}</div>
                    <div class="text-muted-official">总用户数</div>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card-official text-center" style="border-left:4px solid var(--success);">
                <div class="card-body py-4">
                    <div class="h2 font-weight-bold text-success">{{ total_materials }}</div>
                    <div class="text-muted-official">总资料数</div>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card-official text-center" style="border-left:4px solid #00ACC1;">
                <div class="card-body py-4">
                    <div class="h2 font-weight-bold" style="color:#00ACC1;">{{ total_courses }}</div>
                    <div class="text-muted-official">总课程数</div>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card-official text-center" style="border-left:4px solid #FF6F00;">
                <div class="card-body py-4">
                    <div class="h2 font-weight-bold" style="color:#FF6F00;">{{ pending_materials }}</div>
                    <div class="text-muted-official">待审核资料</div>
                </div>
            </div>
        </div>
    </div>
    <div class="card-official">
        <div class="card-body p-4">
            <h5 class="font-weight-bold mb-3">快捷操作</h5>
            <div class="row">
                <div class="col-md-3 mb-2"><a href="{{ url_for('admin.manage_users') }}" class="btn btn-official btn-block">👥 管理用户</a></div>
                <div class="col-md-3 mb-2"><a href="{{ url_for('admin.manage_courses') }}" class="btn btn-official btn-block">📖 管理课程</a></div>
                <div class="col-md-3 mb-2"><a href="{{ url_for('admin.manage_materials') }}" class="btn btn-official btn-block">📂 管理资料</a></div>
                <div class="col-md-3 mb-2"><a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary btn-block">🏠 返回首页</a></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
