{% extends 'base.html' %}
{% block title %}管理课程{% endblock %}
{% block content %}
<div class="page-header">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <h1>📖 管理课程</h1>
            <p>管理所有课程分类</p>
        </div>
        <div>
            <a href="{{ url_for('admin.add_course') }}" class="btn btn-light font-weight-bold mr-2" style="color:var(--primary-dark);border-radius:8px;">+ 添加课程</a>
            <a href="{{ url_for('admin.admin_dashboard') }}" class="btn btn-light font-weight-bold" style="color:var(--primary-dark);border-radius:8px;">← 返回后台</a>
        </div>
    </div>
</div>
<div class="container" style="margin-top:-0.5rem;">
    <div class="card-official">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead style="background:#f5f7fa;">
                    <tr>
                        <th class="py-3">ID</th>
                        <th class="py-3">课程名称</th>
                        <th class="py-3">分类</th>
                        <th class="py-3">操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for course in courses %}
                    <tr>
                        <td class="py-3">{{ course.id }}</td>
                        <td class="py-3 font-weight-bold">{{ course.name }}</td>
                        <td class="py-3"><span class="badge badge-official badge-primary">{{ course.category }}</span></td>
                        <td class="py-3">
                            <a href="{{ url_for('admin.edit_course', course_id=course.id) }}" class="btn btn-sm btn-official-outline mr-1">编辑</a>
                            <form method="POST" action="{{ url_for('admin.delete_course', course_id=course.id) }}" style="display:inline" onsubmit="return confirm('确定删除课程「{{ course.name }}」吗？');">
                                <button type="submit" class="btn btn-sm btn-danger-official">删除</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
