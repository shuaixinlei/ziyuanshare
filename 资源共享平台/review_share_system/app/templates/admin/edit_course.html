{% extends 'base.html' %}

{% block title %}编辑课程 - 复习资料平台{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('admin.courses') }}">课程管理</a></li>
        <li class="breadcrumb-item active">编辑课程</li>
    </ol>
</nav>

<div class="glass-card animate-fade-in-up">
    <div class="glass-card-header">
        <h2 class="glass-card-title">
            <i class="fas fa-edit"></i>编辑课程
        </h2>
    </div>
    <div class="card-body" style="padding: 30px;">
        <form method="POST">
            <div class="form-group">
                <label for="name">课程名称</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ course.name }}" required>
            </div>
            
            <div class="form-group">
                <label for="category">课程分类</label>
                <select class="form-control" id="category" name="category" required>
                    <option value="">请选择分类</option>
                    <option value="数学" {% if course.category == '数学' %}selected{% endif %}>数学</option>
                    <option value="语言" {% if course.category == '语言' %}selected{% endif %}>语言</option>
                    <option value="计算机" {% if course.category == '计算机' %}selected{% endif %}>计算机</option>
                    <option value="管理" {% if course.category == '管理' %}selected{% endif %}>管理</option>
                    <option value="经济" {% if course.category == '经济' %}selected{% endif %}>经济</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> 保存修改
            </button>
            <a href="{{ url_for('admin.courses') }}" class="btn btn-outline ml-2">
                <i class="fas fa-arrow-left"></i> 返回
            </a>
        </form>
    </div>
</div>
{% endblock %}
