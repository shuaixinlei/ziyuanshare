{% extends 'base.html' %}

{% block title %}上传资料 - 复习资料平台{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('main.index') }}">首页</a></li>
        <li class="breadcrumb-item active">上传资料</li>
    </ol>
</nav>

<div class="glass-card animate-fade-in-up">
    <div class="glass-card-header">
        <h2 class="glass-card-title">
            <i class="fas fa-upload"></i>上传资料
        </h2>
    </div>
    <div class="card-body" style="padding: 30px;">
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="title">资料标题</label>
                <input type="text" class="form-control" id="title" name="title" required placeholder="请输入资料标题">
            </div>
            
            <div class="form-group">
                <label for="description">资料描述</label>
                <textarea class="form-control" id="description" name="description" rows="4" placeholder="请简要描述资料内容"></textarea>
            </div>
            
            <div class="form-group">
                <label for="course_id">所属课程</label>
                <select class="form-control" id="course_id" name="course_id" required>
                    <option value="">请选择课程</option>
                    {% for course in courses %}
                    <option value="{{ course.id }}">{{ course.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>资料类型</label>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-check">
                            <input type="radio" class="form-check-input" id="notes" name="material_type" value="notes" checked>
                            <label class="form-check-label" for="notes"><i class="fas fa-file-alt mr-2"></i>复习笔记</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-check">
                            <input type="radio" class="form-check-input" id="exam" name="material_type" value="exam">
                            <label class="form-check-label" for="exam"><i class="fas fa-file-pdf mr-2"></i>历年真题</label>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="file">选择文件</label>
                <div class="custom-file">
                    <input type="file" class="custom-file-input" id="file" name="file" required>
                    <label class="custom-file-label" for="file" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); color: var(--text-secondary);">
                        点击选择文件
                    </label>
                </div>
                <small class="text-muted mt-2 d-block">支持 PDF、Word、图片等格式</small>
            </div>
            
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-cloud-upload-alt"></i> 上传资料
            </button>
        </form>
    </div>
</div>
{% endblock %}
